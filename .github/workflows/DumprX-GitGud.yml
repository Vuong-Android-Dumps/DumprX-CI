name: DumprX GitGud
 
on:
  workflow_dispatch:
    inputs:
      ROM_URL:
        description: "Direct Link of the ROM/Firmware to Dump"
        required: true
      EXTRA_CMD:
        description: "Any Extra Command to Run Before Dump"
        required: false

defaults:
  run:
    shell: bash

env:
  # ROM
  ROM_URL: ${{ github.event.inputs.ROM_URL }}

  # Gitlab
  PUSH_TO_GITLAB: true

  # Extra Command
  EXTRA_CMD: ${{ github.event.inputs.EXTRA_CMD }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
       - name: Cleanup
         uses: rokibhasansagar/slimhub_actions@main
          
       - name: Checkouts
         uses: actions/checkout@v6

       - name: Clone Our Firmware Dumper
         run: |
              git clone https://github.com/Vuong-Android-Dumps/DumprX-Script.git DumprX

       - name: Setup Config envs
         working-directory: DumprX
         run: |
              mkdir -p ~/.ssh
              ssh-keyscan -t rsa github.com >> ~/.ssh/known_hosts
              ssh-keyscan -t rsa ssh.gitgud.io >> ~/.ssh/known_hosts
              echo "${{ secrets.PRIV_SSH_KEY }}" > ~/.ssh/id_rsa
              chmod 600 ~/.ssh/id_rsa
              echo "${{ secrets.GITGUD_TOKEN }}" > .gitlab_token
              echo "Van-Firmware-Dumps" > .gitlab_group
              echo "gitgud.io" > .gitlab_instance
              echo "${{ secrets.TG_TOKEN }}" > .tg_token
              echo "@VanFirmwareDumps" > .tg_chat

       - name: Setup DumprX's Environment
         working-directory: DumprX
         run: |
              git config --global user.name "VanVuong41429"
              git config --global user.email "vanvuong41429@gmail.com"
              curl -LsSf https://astral.sh/uv/install.sh | sh
              sudo bash setup.sh
              sudo apt install erofs-utils -y
              rm ./utils/bin/fsck.erofs && cp /usr/bin/fsck.erofs ./utils/bin
              aria2c -x16 -s8 --console-log-level=warn --summary-interval=0 --check-certificate=false "https://rsddownload-secure.lenovo.com/XT2671-1_ROW_OPEN_USER_Q00012.1_A16_ZUI_18.0.10.120_ST_260519.zip?X-Amz-Algorithm=AWS4-HMAC-SHA256&X-Amz-Date=20260611T114744Z&X-Amz-SignedHeaders=host&X-Amz-Credential=AKIAS37TSJMJUUCJCY4T%2F20260611%2Fus-east-1%2Fs3%2Faws4_request&X-Amz-Expires=604800&X-Amz-Signature=e8f617f86761cac96458482d2e363ca50f4bf177a8fd472c5f3e1d5f655dc0ca"
              7z e -y XT2671-1_ROW_OPEN_USER_Q00012.1_A16_ZUI_18.0.10.120_ST_260519.zip -oXT2671-1 && rm XT2671-1_ROW_OPEN_USER_Q00012.1_A16_ZUI_18.0.10.120_ST_260519.zip && cd XT2671-1
              mv super_4.img system.img && mv super_5.img system_dlkm.img && mv super_7.img vendor.img && mv super_8.img vendor_dlkm.img && cd .. && zip -r XT2671-1.zip XT2671-1/ && rm -rf XT2671-1

       - name: Run the Extra Command
         working-directory: DumprX
         run: |
              $EXTRA_CMD

       - name: Start Dumping
         working-directory: DumprX
         run: |
              trap 'echo "SIGTERM received"; exit 1' TERM
              ./dumper_gitgud.sh "$ROM_URL"
