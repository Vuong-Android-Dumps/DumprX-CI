name: DumprX GitGud New
 
on:
  workflow_dispatch:
    inputs:
      ROM_URL:
        description: "Direct Link of the ROM/Firmware to Dump"
        required: true
      EXTRA_CMD:
        description: "Any Extra Command to Run Before Dump"
        required: false

defaults:
  run:
    shell: bash

env:
  # ROM
  ROM_URL: ${{ github.event.inputs.ROM_URL }}

  # Gitlab
  PUSH_TO_GITLAB: true

  # Extra Command
  EXTRA_CMD: ${{ github.event.inputs.EXTRA_CMD }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
       - name: Maximize build space
         uses: easimon/maximize-build-space@master
         with:
              root-reserve-mb: 512
              temp-reserve-mb: 100
              swap-size-mb: 1024
              remove-dotnet: 'true'
              remove-android: 'true'
              remove-haskell: 'true'
              remove-codeql: 'true'
              remove-docker-images: 'true'
          
       - name: Checkouts
         uses: actions/checkout@v6

       - name: Clone Our Firmware Dumper
         working-directory: ${{ github.workspace }}
         run: |
              git clone https://github.com/Vuong-Android-Dumps/DumprX-Script.git DumprX

       - name: Setup Config envs
         working-directory: ${{ github.workspace }}/DumprX
         run: |  
              mkdir -p ~/.ssh
              ssh-keyscan -t rsa github.com >> ~/.ssh/known_hosts
              ssh-keyscan -t rsa gitgud.io >> ~/.ssh/known_hosts || {
                   sleep 30 && ssh-keyscan -t rsa gitgud.io >> ~/.ssh/known_hosts
              }
              echo "${{ secrets.PRIV_SSH_KEY }}" > ~/.ssh/id_rsa
              chmod 600 ~/.ssh/id_rsa
              echo "${{ secrets.GITGUD_TOKEN }}" > .gitlab_token
              echo "Van-Firmware-Dumps" > .gitlab_group
              echo "gitgud.io" > .gitlab_instance
              echo "${{ secrets.TG_TOKEN }}" > .tg_token
              echo "@VanFirmwareDumps" > .tg_chat

       - name: Setup DumprX's Environment
         working-directory: ${{ github.workspace }}/DumprX
         run: |
              git config --global user.name "VanVuong41429"
              git config --global user.email "vanvuong41429@gmail.com"
              curl -LsSf https://astral.sh/uv/install.sh | sh
              sudo bash setup.sh
              sudo apt install erofs-utils -y
              rm ./utils/bin/fsck.erofs && cp /usr/bin/fsck.erofs ./utils/bin
              aria2c -x16 -s8 --console-log-level=warn --summary-interval=0 --check-certificate=false "https://rsddownload-secure.lenovo.com/TB520FU_ROW_OPEN_USER_Q00002.0_W_ZUI_17.5.10.096_ST_251127.zip?X-Amz-Algorithm=AWS4-HMAC-SHA256&X-Amz-Date=20260404T120233Z&X-Amz-SignedHeaders=host&X-Amz-Credential=AKIAS37TSJMJUUCJCY4T%2F20260404%2Fus-east-1%2Fs3%2Faws4_request&X-Amz-Expires=604800&X-Amz-Signature=c362134e25929aaa98fb057c7fa455f3967c205602a07adc8f31c16cdc0a0556"
              7z e -y -ofirmware TB520FU_ROW_OPEN_USER_Q00002.0_W_ZUI_17.5.10.096_ST_251127.zip && rm TB520FU_ROW_OPEN_USER_Q00002.0_W_ZUI_17.5.10.096_ST_251127.zip
              cd firmware && rm super_1.img && mv super_2.img odm.img && mv super_3.img product.img && mv super_4.img system.img && mv super_5.img system_dlkm.img && mv super_6.img system_ext.img && mv super_7.img vendor.img && mv super_8.img vendor_dlkm.img && cd .. && zip -r firmware.zip firmware/ && rm -rf firmware

              
       - name: Run the Extra Command
         working-directory: ${{ github.workspace }}/DumprX
         run: |
              $EXTRA_CMD

       - name: Start Dumping
         working-directory: ${{ github.workspace }}/DumprX
         run: |
              ./dumper.sh "$ROM_URL"
