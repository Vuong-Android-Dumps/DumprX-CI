name: DumprX GitGud New
 
on:
  workflow_dispatch:
    inputs:
      ROM_URL:
        description: "Direct Link of the ROM/Firmware to Dump"
        required: true
      EXTRA_CMD:
        description: "Any Extra Command to Run Before Dump"
        required: false

defaults:
  run:
    shell: bash

env:
  # ROM
  ROM_URL: ${{ github.event.inputs.ROM_URL }}

  # Gitlab
  PUSH_TO_GITLAB: true

  # Extra Command
  EXTRA_CMD: ${{ github.event.inputs.EXTRA_CMD }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
       - name: Maximize build space
         uses: easimon/maximize-build-space@master
         with:
              root-reserve-mb: 512
              temp-reserve-mb: 100
              swap-size-mb: 1024
              remove-dotnet: 'true'
              remove-android: 'true'
              remove-haskell: 'true'
              remove-codeql: 'true'
              remove-docker-images: 'true'
          
       - name: Checkouts
         uses: actions/checkout@v6

       - name: Clone Our Firmware Dumper
         working-directory: ${{ github.workspace }}
         run: |
              git clone https://github.com/Vuong-Android-Dumps/DumprX-Script.git DumprX

       - name: Setup Config envs
         working-directory: ${{ github.workspace }}/DumprX
         run: |  
              mkdir -p ~/.ssh
              ssh-keyscan -t rsa github.com >> ~/.ssh/known_hosts
              ssh-keyscan -t rsa gitgud.io >> ~/.ssh/known_hosts || {
                   sleep 30 && ssh-keyscan -t rsa gitgud.io >> ~/.ssh/known_hosts
              }
              echo "${{ secrets.PRIV_SSH_KEY }}" > ~/.ssh/id_rsa
              chmod 600 ~/.ssh/id_rsa
              echo "${{ secrets.GITGUD_TOKEN }}" > .gitlab_token
              echo "Van-Firmware-Dumps" > .gitlab_group
              echo "gitgud.io" > .gitlab_instance
              echo "${{ secrets.TG_TOKEN }}" > .tg_token
              echo "@VanFirmwareDumps" > .tg_chat

       - name: Setup DumprX's Environment
         working-directory: ${{ github.workspace }}/DumprX
         run: |
              git config --global user.name "VanVuong41429"
              git config --global user.email "vanvuong41429@gmail.com"
              curl -LsSf https://astral.sh/uv/install.sh | sh
              sudo bash setup.sh
              sudo apt install erofs-utils -y
              rm ./utils/bin/fsck.erofs && cp /usr/bin/fsck.erofs ./utils/bin
              aria2c -x16 -s8 --console-log-level=warn --summary-interval=0 --check-certificate=false "https://ota-cdn.lenovo.com/firmware/202641311221923-2235.zip"
              7z e -y 202641311221923-2235.zip -oA17 && rm 202641311221923-2235.zip
              7z e -y A17/DPP_A17_ROW_OPEN_USER_Q00011.0_A16_ZUI_17.5.02.014_DEV_260325_qpst.7z -oA17 && rm A17/DPP_A17_ROW_OPEN_USER_Q00011.0_A16_ZUI_17.5.02.014_DEV_260325_qpst.7z
              cd A17 && mv super_2.img odm.img && mv super_3.img product.img && mv super_4.img system.img && mv super_5.img system_dlkm.img && mv super_6.img system_ext.img && mv super_7.img vendor.img && mv super_8.img vendor_dlkm.img && rm super_1.img && cd ..
              zip -r A17.zip A17/ && rm -rf A17
            
       - name: Run the Extra Command
         working-directory: ${{ github.workspace }}/DumprX
         run: |
              $EXTRA_CMD

       - name: Start Dumping
         working-directory: ${{ github.workspace }}/DumprX
         run: |
              ./dumper.sh "$ROM_URL"
